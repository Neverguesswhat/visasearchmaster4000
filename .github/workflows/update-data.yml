name: Deploy to DreamHost

on:
  # Auto-deploy whenever data.js or index.html is pushed
  push:
    branches: [main]
    paths:
      - 'data.js'
      - 'index.html'

  # Also allow manual trigger
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to DreamHost via SFTP
        env:
          DREAMHOST_HOST: ${{ secrets.DREAMHOST_HOST }}
          DREAMHOST_USER: ${{ secrets.DREAMHOST_USER }}
          DREAMHOST_KEY:  ${{ secrets.DREAMHOST_KEY }}
          DREAMHOST_PATH: ${{ secrets.DREAMHOST_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$DREAMHOST_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DREAMHOST_HOST" >> ~/.ssh/known_hosts

          sftp -i ~/.ssh/deploy_key -b - "$DREAMHOST_USER@$DREAMHOST_HOST" <<EOF
          cd $DREAMHOST_PATH
          put data.js
          put index.html
          EOF

          echo "✓ Deployed to $DREAMHOST_HOST:$DREAMHOST_PATH"
